<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Principal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <a href="menu.html" id="back-button" class="back-button" title="Voltar ao Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
    </a>

    <div id="app">
        <header>
            <h1>Escolha o Tema</h1>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
            </div>
        </header>
        <main>
            <section>
                <!-- <h2>Bem-vindo ao Material Digital de Fisiologia</h2> -->
                <div style="text-align: center; margin-top: 2rem; display: flex; flex-direction: column; gap: 1rem;">
                    <a href="index.html" style="text-decoration: none;" onclick="localStorage.setItem('topic', '0')">
                        <button id="random-questions-button" class="action-button" style="margin-top: 0; width: 100%; min-width: 250px;">
                            Perguntas Aleatórias
                        </button>
                    </a>
                    <a href="index.html" style="text-decoration: none;" onclick="localStorage.setItem('topic', '1')">
                        <button id="cardiology-button" class="action-button" style="margin-top: 0; width: 100%; min-width: 250px;">
                            Cardiologia
                        </button>
                    </a>
                </div>
            </section>
        </main>
    </div>
    <script>
        // Theme switcher functionality
        const checkbox = document.getElementById('checkbox');
        const html = document.documentElement;

        checkbox.addEventListener('change', () => {
            if (checkbox.checked) {
                document.body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
            }
        });

        // Load saved theme preference
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            checkbox.checked = true;
            document.body.classList.add('dark-theme');
        }
    </script>
</body>

</html>
