<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo das 4 dicas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <button id="back-button" class="back-button" title="Voltar ao Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
    </button>

    <div id="app">
        
        <header>
            <h1>Jogo das 4 dicas</h1>
            <div id="status-bar" class="status-bar">
                <div id="score-display">Score: 0</div>
                <div id="round-progress">Questão: 0/5</div>
            </div>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="checkbox">
                    <input type="checkbox" id="checkbox" />
                    <div class="slider round"></div>
                </label>
            </div>
        </header>
        <main>
            <section id="topics-section" class="hidden">
                <h2>Escolha um tópico para começar</h2>
                <div id="topics-container"></div>
            </section>
            <section id="roulette-section">
                <!-- <h2 id="perguntas-aleatorias">Perguntas Aleatórias</h2> -->
                <div id="roulette-wheel"></div>
                <button id="spin-button" class="action-button">Girar Roleta</button>            </section>
            <section id="question-section" class="hidden">
                <h3 id="question-text"></h3>
                <div class="hints-n-timer-container" style="display: flex; justify-content: center; align-items: center; gap: 4rem; margin-top: 1rem;">
                    <div id="possible-score-display" style="text-align: center; font-size: 1.2rem; font-weight: bold; color: var(--action-button-bg-color); min-width: 100px;">
                        <div>Pontuação Possível</div>
                        <div id="possible-score" style="font-size: 2rem;">100</div>
                    </div>
                    <div id="hints-container"></div>
                    <div id="hint-timer-display" class="time-display"></div>
                </div>
                <div id="hint-timer-controls" class="hidden" style="display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 1rem;">
                    <button id="next-hint-button" class="action-button">Próxima Dica</button>
                    <button id="answer-now-button" class="action-button">Responder Agora</button>
                </div>
                <div id="user-answer-container" class="hidden">
                    <input type="text" id="user-answer-input" placeholder="Digite sua resposta aqui...">
                    <button id="submit-answer-button" class="action-button">Enviar Resposta</button>
                </div>
                <div id="feedback-message" class="hidden"></div>
                <button id="show-answer-button" class="action-button">Mostrar Resposta</button>
                <div id="timer-display" ></div>
                <div id="answer-container" class="hidden">
                    <p id="answer-text"></p>
                    <div id="correct-wrong-container" class="hidden" style="display: flex; justify-content: center; align-items: center; gap: 1rem; margin-top: 1rem;">
                        <button id="next-question-button" class="action-button">Próxima Pergunta</button>
                    </div>
                </div>
                <button id="next-button" class="action-button hidden">Próxima</button>
            </section>
        </main>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
